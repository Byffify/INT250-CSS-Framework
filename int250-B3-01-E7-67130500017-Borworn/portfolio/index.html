<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="

      referrerpolicy="no-referrer"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Borworn Kultumyotin — Year 2 IT student and Full Stack Developer specializing in Vue.js, modern web apps, and scalable solutions."
    />
    <title>Borworn Kultumyotin | Full Stack Developer</title>
    <script>
      (function () {
        var k = "portfolio-theme";
        var s = localStorage.getItem(k);
        var dark =
          s === "dark" ||
          (s !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
